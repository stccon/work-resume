appId: com.resume-ai.assistant
productName: AI简历助手
copyright: Copyright © 2026

compression: maximum

directories:
  output: release

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png

nsis:
  perMachine: false
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

files:
  - dist
  - dist-electron
  - templates
  - themes
  - package.json
  - "!node_modules/@napi-rs/canvas*/**"

extraResources:
  - from: node_modules/opencode-ai/bin
    to: opencode-ai/bin

afterPack: scripts/clean-after-pack.js
